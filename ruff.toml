# Ruff configuration for hutool-python
# https://docs.astral.sh/ruff/

target-version = "py38"
line-length = 120

[lint]
select = [
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "F",   # pyflakes
    "I",   # isort
    "UP",  # pyupgrade
    "B",   # flake8-bugbear
    "SIM", # flake8-simplify
    "RUF", # ruff-specific rules
]
ignore = [
    "E501",   # line too long (handled by formatter)
    "E741",   # ambiguous variable name (common in math utils)
    "B007",   # unused loop control variable
    "B904",   # raise ... from err in except
    "SIM102", # combine nested if (not always clearer)
    "SIM105", # use contextlib.suppress (style preference)
    "SIM108", # use ternary operator (not always clearer)
    "SIM110", # use any()/all() instead of for-loop (readability varies)
    "SIM115", # use context manager for open()
    "UP006",  # use type instead of Type (requires 3.9+)
    "UP007",  # use X | Y for union types (requires 3.10+)
    "UP035",  # deprecated typing imports (we need them for 3.8)
    "UP045",  # use X | Y for Optional (requires 3.10+)
    "RUF001", # ambiguous unicode character in string (Chinese text)
    "RUF002", # ambiguous unicode character in docstring (Chinese punctuation)
    "RUF003", # ambiguous unicode character in comment (Chinese punctuation)
    "RUF012", # mutable class variables without ClassVar
]

[lint.isort]
known-first-party = ["hutool"]

[lint.per-file-ignores]
"__init__.py" = ["F401"]  # unused imports (re-exports)

[format]
quote-style = "double"
indent-style = "space"
skip-magic-trailing-comma = false
